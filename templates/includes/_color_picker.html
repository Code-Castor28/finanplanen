<style>
.color-picker { position:relative; }
.color-picker .icon-search { width:100%; margin-bottom:8px; padding:8px 10px; border:1.5px solid var(--olv,#ddd); border-radius:6px; font-size:13px; outline:none; box-sizing:border-box; background:var(--bg,#fff); color:var(--tx,#333); }
.color-picker .icon-search:focus { border-color:var(--pr,#1a73e8); }
.color-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:6px; max-height:200px; overflow-y:auto; padding:4px 0; }
.color-tile { display:flex; flex-direction:column; align-items:center; padding:8px 4px; border:2px solid transparent; border-radius:8px; cursor:pointer; transition:all .12s ease; gap:4px; }
.color-tile:hover { background:var(--sc,#f0f2f5); }
.color-tile.selected { border-color:var(--pr,#1a73e8); background:var(--sc-light,#e8f0fe); }
.color-swatch { width:28px; height:28px; border-radius:50%; border:1px solid var(--olv,#ddd); flex-shrink:0; }
.color-tile span { font-size:11px; color:var(--ov,#666); text-align:center; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:76px; }
</style>
<div class="color-picker">
  <div style="display:none">{{ field }}</div>
  <input type="text" id="{{ field.auto_id }}-search" class="icon-search" placeholder="Buscar color..." autocomplete="off">
  <div class="color-grid" id="{{ field.auto_id }}-grid">
    {% for opt in field.field.queryset %}
    <div class="color-tile{% if field.value == opt.pk %} selected{% endif %}" data-pk="{{ opt.pk }}" data-search="{{ opt.nombre|lower }}">
      <span class="color-swatch" style="background:{{ opt.hex }}"></span>
      <span>{{ opt.nombre }}</span>
    </div>
    {% endfor %}
  </div>
</div>
<script>
(function(){
  var grid = document.getElementById('{{ field.auto_id }}-grid');
  var search = document.getElementById('{{ field.auto_id }}-search');
  var select = document.getElementById('{{ field.auto_id }}');
  if (!grid || !select) return;
  grid.addEventListener('click', function(e){
    var tile = e.target.closest('.color-tile');
    if (!tile) return;
    grid.querySelectorAll('.color-tile').forEach(function(t){ t.classList.remove('selected'); });
    tile.classList.add('selected');
    select.value = tile.dataset.pk;
  });
  if (search) {
    search.addEventListener('input', function(){
      var q = this.value.toLowerCase().trim();
      grid.querySelectorAll('.color-tile').forEach(function(t){
        t.style.display = (!q || (t.dataset.search||'').includes(q)) ? '' : 'none';
      });
    });
  }
})();
</script>
