<style>
.icon-picker { position:relative; }
.icon-picker .icon-search { width:100%; margin-bottom:8px; padding:8px 10px; border:1.5px solid var(--olv,#ddd); border-radius:6px; font-size:13px; outline:none; box-sizing:border-box; background:var(--bg,#fff); color:var(--tx,#333); }
.icon-picker .icon-search:focus { border-color:var(--pr,#1a73e8); }
.icon-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(68px,1fr)); gap:6px; max-height:220px; overflow-y:auto; padding:4px 0; }
.icon-tile { display:flex; flex-direction:column; align-items:center; padding:8px 2px; border:2px solid transparent; border-radius:8px; cursor:pointer; transition:all .12s ease; }
.icon-tile:hover { background:var(--sc,#f0f2f5); }
.icon-tile.selected { border-color:var(--pr,#1a73e8); background:var(--sc-light,#e8f0fe); }
.icon-tile i { font-size:20px; color:var(--tx,#333); }
.icon-tile.selected i { color:var(--pr,#1a73e8); }
.icon-tile span { font-size:10px; color:var(--ov,#666); text-align:center; margin-top:4px; line-height:1.2; word-break:break-all; max-width:68px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
<div class="icon-picker">
  <div style="display:none">{{ field }}</div>
  <input type="text" id="{{ field.auto_id }}-search" class="icon-search" placeholder="Buscar icono..." autocomplete="off">
  <div class="icon-grid" id="{{ field.auto_id }}-grid">
    {% for opt in field.field.queryset %}
    <div class="icon-tile{% if field.value == opt.pk %} selected{% endif %}" data-pk="{{ opt.pk }}" data-search="{{ opt.nombre|lower }}">
      <i class="fas {{ opt.clase_css }}"></i>
      <span>{{ opt.nombre }}</span>
    </div>
    {% endfor %}
  </div>
</div>
<script>
(function(){
  var grid = document.getElementById('{{ field.auto_id }}-grid');
  var search = document.getElementById('{{ field.auto_id }}-search');
  var select = document.getElementById('{{ field.auto_id }}');
  if (!grid || !select) return;
  grid.addEventListener('click', function(e){
    var tile = e.target.closest('.icon-tile');
    if (!tile) return;
    grid.querySelectorAll('.icon-tile').forEach(function(t){ t.classList.remove('selected'); });
    tile.classList.add('selected');
    select.value = tile.dataset.pk;
  });
  if (search) {
    search.addEventListener('input', function(){
      var q = this.value.toLowerCase().trim();
      grid.querySelectorAll('.icon-tile').forEach(function(t){
        t.style.display = (!q || (t.dataset.search||'').includes(q)) ? '' : 'none';
      });
    });
  }
})();
</script>
