<form method="post"
      hx-post="{% if object %}{% url 'theme:colores_editar' object.pk %}{% else %}{% url 'theme:colores_crear' %}{% endif %}"
      hx-target="this"
      hx-swap="outerHTML"
      _="on htmx:afterRequest if htmx:response.headers['HX-Redirect'] then remove .open from #form-modal">
  {% csrf_token %}
  <div class="form-group">
    <label for="{{ form.nombre.id_for_label }}">{{ form.nombre.label }}</label>
    {{ form.nombre }}
    {% for error in form.nombre.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
  </div>
  <div class="form-group">
    <label for="{{ form.slug.id_for_label }}">{{ form.slug.label }}</label>
    {{ form.slug }}
    {% for error in form.slug.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
  </div>
  <div class="form-group">
    <label for="{{ form.hex.id_for_label }}">{{ form.hex.label }}</label>
    {{ form.hex }}
    {% for error in form.hex.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
  </div>
  <div class="form-group">
    <label class="checkbox-label">
      {{ form.activo }} {{ form.activo.label }}
    </label>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">
      <i class="fas fa-save"></i> {% if object %}Guardar{% else %}Crear{% endif %}
    </button>
    <button type="button" class="btn btn-secondary" _="on click remove .open from #form-modal">
      Cancelar
    </button>
  </div>
</form>
