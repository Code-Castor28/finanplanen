<div class="confirm-delete">
  <p>¿Eliminar <strong>{{ object }}</strong>?</p>
  <p class="text-muted" style="font-size:13px;color:var(--ol,#767683);margin-bottom:16px">Esta acción no se puede deshacer.</p>
  <form method="post"
        hx-post="{{ request.path }}"
        hx-target="this"
        hx-swap="outerHTML"
        _="on htmx:beforeSend remove @open from #form-modal">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn-danger"><i class="fas fa-trash"></i> Eliminar</button>
      <button type="button" class="btn-secondary" _="on click remove @open from #form-modal">Cancelar</button>
    </div>
  </form>
</div>
